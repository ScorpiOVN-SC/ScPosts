<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Блог{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #E6E6E6;
            min-height: 100vh;
        }

        :root {
            --md-sys-color-primary: #C6C6C6;
            --md-sys-color-on-primary: #2B2B2B;
            --md-sys-color-primary-container: #464646;
            --md-sys-color-on-primary-container: #E2E2E2;
            --md-sys-color-secondary: #C6C6C6;
            --md-sys-color-on-secondary: #2B2B2B;
            --md-sys-color-secondary-container: #3A3A3A;
            --md-sys-color-on-secondary-container: #E2E2E2;
            --md-sys-color-tertiary: #A8A8A8;
            --md-sys-color-on-tertiary: #303030;
            --md-sys-color-tertiary-container: #424242;
            --md-sys-color-on-tertiary-container: #D6D6D6;
            --md-sys-color-error: #F2B8B5;
            --md-sys-color-on-error: #4A1E1C;
            --md-sys-color-error-container: #8C3A35;
            --md-sys-color-on-error-container: #FFDAD6;
            --md-sys-color-background: #121212;
            --md-sys-color-on-background: #E6E6E6;
            --md-sys-color-surface: #121212;
            --md-sys-color-on-surface: #E6E6E6;
            --md-sys-color-surface-variant: #2C2C2C;
            --md-sys-color-on-surface-variant: #C7C7C7;
            --md-sys-color-surface-container-lowest: #0F0F0F;
            --md-sys-color-surface-container-low: #1C1C1C;
            --md-sys-color-surface-container: #242424;
            --md-sys-color-surface-container-high: #2C2C2C;
            --md-sys-color-surface-container-highest: #343434;
            --md-sys-color-outline: #8F8F8F;
            --md-sys-color-outline-variant: #464646;
            --md-sys-color-inverse-surface: #E6E6E6;
            --md-sys-color-inverse-on-surface: #2B2B2B;
            --md-sys-color-inverse-primary: #464646;
            --md-sys-color-primary-fixed: #C6C6C6;
            --md-sys-color-on-primary-fixed: #1C1C1C;
            --md-sys-color-primary-fixed-dim: #A8A8A8;
            --md-sys-color-on-primary-fixed-variant: #3D3D3D;
        }

        header {
            background-color: var(--md-sys-color-surface);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--md-sys-color-on-surface);
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 500;
        }

        .btn-new {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            padding: 10px 20px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .btn-new:hover {
            background-color: #A8A8A8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
            min-height: calc(100vh - 140px);
        }

        .post-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px 3px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px 6px rgba(0,0,0,0.4), 0 4px 8px 3px rgba(0,0,0,0.2);
        }

        .post-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .post-title a {
            text-decoration: none;
            color: var(--md-sys-color-on-surface);
        }

        .post-title a:hover {
            text-decoration: underline;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 14px;
        }

        .post-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .material-symbols-outlined {
            font-size: 18px;
        }

        .post-content {
            color: var(--md-sys-color-on-surface-variant);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .btn-read {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--md-sys-color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .btn-read:hover {
            text-decoration: underline;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            border: none;
            border-radius: 16px;
            background-color: var(--md-sys-color-surface-container-low);
            color: var(--md-sys-color-on-surface);
        }

        input:focus, textarea:focus {
            outline: none;
            background-color: var(--md-sys-color-surface-container);
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--md-sys-color-on-surface-variant);
            font-weight: 500;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 32px;
        }

        .pagination a, .pagination span {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
            padding: 0 12px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--md-sys-color-on-surface);
            font-weight: 500;
        }

        .pagination a:hover {
            background-color: var(--md-sys-color-surface-container-high);
        }

        .pagination .current {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .comment-card {
            background-color: #242424 !important;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            color: #E6E6E6;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="{% url 'posts:post_list' %}" class="logo">
                <span class="material-symbols-outlined">article</span>
                <h1>ScPosts</h1>
            </a>
            <a href="{% url 'posts:post_create' %}" class="btn-new">
                <span class="material-symbols-outlined">add</span>
                Новый пост
            </a>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
